<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Elite Vocalizer | Dynamic Pro</title><style>:root{--primary:#00ff88;--bg:#0d1117;--card:#161b22;--text:#c9d1d9;--gradient:linear-gradient(45deg, #00ff88, #00bdff, #7000ff)}body{font-family:'Segoe UI',sans-serif;background-color:var(--bg);color:var(--text);margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}.container{max-width:550px;width:100%;background:var(--card);padding:40px;border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,0.7);border:1px solid #30363d;position:relative;text-align:center}.brand-title{font-size:2.8rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}textarea{width:100%;padding:20px;background:#0d1117;border:1px solid #30363d;border-radius:16px;color:white;box-sizing:border-box;font-size:1.1rem;margin-bottom:25px;resize:none;min-height:180px}.btn{width:100%;padding:18px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;font-size:1.1rem;text-transform:uppercase;transition:0.3s;margin-bottom:15px}.btn-play{background:var(--primary);color:#0d1117}.btn-download{background:transparent;color:var(--primary);border:2px solid var(--primary);display:none}.wave-box{display:none;justify-content:center;align-items:center;gap:5px;height:40px;margin-bottom:25px}.w{width:5px;height:100%;background:var(--primary);border-radius:10px;animation:wv 1.2s ease-in-out infinite}@keyframes wv{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1.2)}}.audio-sel{position:fixed;bottom:25px;right:25px;display:flex;flex-direction:column;align-items:center;background:var(--card);border:1px solid var(--primary);border-radius:10px;padding:6px 10px;cursor:pointer;z-index:100}.atxt{font-size:8px;color:var(--text);margin-top:4px;text-transform:uppercase;font-weight:700}#vSel{position:fixed;bottom:90px;right:25px;background:var(--card);color:white;border:1px solid var(--primary);padding:10px;display:none;border-radius:12px;font-size:13px;max-width:200px;z-index:101}</style></head><body><div class="container"><h1>Elite Vocalizer</h1><div id="wb" class="wave-box"><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div></div><textarea id="i" placeholder="Paste your text here..."></textarea><button class="btn btn-play" onclick="r()">Generate Audio</button><button id="d" class="btn btn-download" onclick="dl()">Download MP3</button></div><select id="vSel" onchange="this.style.display='none'"></select><div class="audio-sel" onclick="tV()"><span style="font-size:18px">🎧</span><span class="atxt">Select Audio</span></div><script>const s=window.speechSynthesis;let currentLang="ur";function lV(){const vs=s.getVoices();const sel=document.getElementById("vSel");sel.innerHTML=vs.map((v,i)=>`<option value="${i}" data-lang="${v.lang}" ${v.lang.includes('ur-PK')?'selected':''}>${v.name}</option>`).join("")}if(s.onvoiceschanged!==undefined)s.onvoiceschanged=lV;lV();function tV(){const sel=document.getElementById("vSel");sel.style.display=sel.style.display==='block'?'none':'block';lV()}function r(){const t=document.getElementById("i").value;const w=document.getElementById("wb");const sel=document.getElementById("vSel");if(!t)return;if(s.speaking)s.cancel();const u=new SpeechSynthesisUtterance(t);const v=s.getVoices();if(sel.value!==""){const selectedVoice=v[sel.value];u.voice=selectedVoice;u.lang=selectedVoice.lang;currentLang=selectedVoice.lang.split('-')[0]}else{if(/[\u0600-\u06FF]/.test(t)){u.lang="ur-PK";currentLang="ur";u.voice=v.find(x=>x.lang.includes("ur"))}else{u.lang="en-US";currentLang="en"}}u.rate=0.9;s.speak(u);u.onstart=()=>{w.style.display="flex";document.getElementById("d").style.display="block"};u.onend=()=>{w.style.display="none"}}function dl(){const t=document.getElementById("i").value;const dlLink=`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(t)}&tl=${currentLang}&client=tw-ob`;window.open(dlLink)}</script></body></html>
