<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Elite Vocalizer Pro | AI Business Asset</title><meta name="description" content="Professional AI Text-to-Speech for Urdu, English, Arabic, and German."><style>:root{--p:#00ff88;--s:#00bdff;--bg:#05070a;--c:#11141b;--g:linear-gradient(135deg,#00ff88,#00bdff,#7000ff)}body{font-family:'Inter',sans-serif;background-color:var(--bg);color:#fff;margin:0;display:flex;flex-direction:column;align-items:center;min-height:100vh}.ad-slot{width:100%;max-width:728px;height:90px;background:rgba(255,255,255,0.03);margin:20px 0;border:1px dashed #333;display:flex;justify-content:center;align-items:center;color:#444;font-size:10px;text-transform:uppercase}.container{max-width:500px;width:90%;background:rgba(17,20,27,0.8);padding:40px;border-radius:40px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);box-shadow:0 0 80px rgba(0,255,136,0.15);text-align:center;margin-bottom:30px}.t{font-size:3rem;font-weight:900;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(0,255,136,0.4))}textarea{width:100%;padding:20px;background:rgba(0,0,0,0.3);border:1px solid #30363d;border-radius:20px;color:#fff;font-size:1.1rem;margin-bottom:20px;resize:none;min-height:180px;box-sizing:border-box;outline:none}textarea:focus{border-color:var(--p)}.btn{width:100%;padding:18px;border:none;border-radius:20px;font-weight:800;cursor:pointer;font-size:1.1rem;background:var(--g);color:#000;transition:0.4s}.wb{display:none;justify-content:center;gap:8px;height:40px;margin-bottom:20px}.w{width:6px;height:100%;border-radius:10px;animation:v 1s infinite}.w:nth-child(odd){background:var(--p)}.w:nth-child(even){background:var(--s);animation-delay:0.2s}@keyframes v{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1.2)}}.footer-info{max-width:800px;padding:40px;color:#8b949e;line-height:1.6}.s-box{position:fixed;bottom:30px;right:30px;background:var(--c);border:1px solid var(--p);border-radius:20px;padding:15px;cursor:pointer;z-index:100}#vSel{position:fixed;bottom:100px;right:30px;background:var(--c);color:#fff;border:1px solid var(--p);padding:15px;display:none;border-radius:15px;z-index:101}</style></head><body><div class="ad-slot">ADSENSE_TOP_UNIT</div><div class="container"><div class="t">Elite Vocalizer</div><div id="wb" class="wb"><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div></div><textarea id="i" placeholder="Enter script..."></textarea><button class="btn" onclick="r()">Generate Audio</button></div><div class="ad-slot" style="height:250px;max-width:300px">ADSENSE_MID_UNIT</div><div class="footer-info"><h3>Professional AI Voiceover Asset</h3><p>Elite Vocalizer provides high-fidelity text-to-speech conversion for global business communication. Supporting Urdu, English, Arabic, and German with neural-grade accuracy.</p></div><select id="vSel" onchange="sV(this.value)"><option value="ur-PK">Urdu</option><option value="en-US">English</option><option value="ar-SA">Arabic</option><option value="de-DE">German</option></select><div class="s-box" onclick="tV()">🎙️</div><script>let s=window.speechSynthesis,cL=localStorage.getItem("cL")||"ur-PK";function tV(){let x=document.getElementById("vSel");x.style.display=x.style.display==="block"?"none":"block"}function sV(v){cL=v;localStorage.setItem("cL",v);tV()}function r(){let t=document.getElementById("i").value,w=document.getElementById("wb");if(!t)return;s.cancel();let u=new SpeechSynthesisUtterance(t);u.lang=cL;u.rate=0.95;u.onstart=()=>w.style.display="flex";u.onend=()=>w.style.display="none";s.speak(u)}</script></body></html>
