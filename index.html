<!DOCTYPE html><html lang="ur"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Elite Vocalizer | Pro AI Voice</title><style>:root{--primary:#00ff88;--bg:#0d1117;--card:#161b22;--text:#c9d1d9;--gradient:linear-gradient(45deg, #00ff88, #00bdff, #7000ff)}body{font-family:'Segoe UI',sans-serif;background-color:var(--bg);color:var(--text);margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}.container{max-width:550px;width:100%;background:var(--card);padding:40px;border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,0.7);border:1px solid #30363d;position:relative;text-align:center}.brand-title{font-size:2.5rem;font-weight:800;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;letter-spacing:-1px}p.subtitle{font-size:0.9rem;color:#8b949e;margin-bottom:30px}textarea{width:100%;padding:20px;background:#0d1117;border:1px solid #30363d;border-radius:16px;color:white;box-sizing:border-box;font-size:1.1rem;margin-bottom:25px;resize:none;min-height:180px;transition:0.4s}textarea:focus{border-color:var(--primary);outline:none;box-shadow:0 0 15px rgba(0,255,136,0.15)}.btn{width:100%;padding:18px;border:none;border-radius:12px;font-weight:bold;cursor:pointer;font-size:1.1rem;text-transform:uppercase;transition:0.3s;margin-bottom:15px}.btn-play{background:var(--primary);color:#0d1117;box-shadow:0 4px 15px rgba(0,255,136,0.2)}.btn-download{background:transparent;color:var(--primary);border:2px solid var(--primary);display:none}.btn:hover{transform:translateY(-2px);opacity:0.9}.wave-box{display:none;justify-content:center;align-items:center;gap:5px;height:40px;margin-bottom:20px}.w{width:4px;height:100%;background:var(--primary);border-radius:10px;animation:wv 1.2s ease-in-out infinite}.w:nth-child(2){animation-delay:0.2s}.w:nth-child(3){animation-delay:0.4s}.w:nth-child(4){animation-delay:0.6s}.w:nth-child(5){animation-delay:0.2s}@keyframes wv{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1.2)}}.audio-sel{position:fixed;bottom:25px;right:25px;display:flex;flex-direction:column;align-items:center;background:var(--card);border:1px solid var(--primary);border-radius:12px;padding:8px;cursor:pointer;z-index:100;transition:0.3s}.audio-sel:hover{background:#1c2128;transform:scale(1.05)}.atxt{font-size:9px;color:var(--text);margin-top:4px;text-transform:uppercase;font-weight:600}#vSel{position:fixed;bottom:90px;right:25px;background:var(--card);color:white;border:1px solid var(--primary);padding:10px;display:none;border-radius:12px;font-size:13px;max-width:200px;z-index:101}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}</style></head><body><div class="container" role="main"><div class="brand-title">Elite Vocalizer</div><p class="subtitle">Next-Gen AI Speech Synthesis</p><div id="wb" class="wave-box"><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div></div><label for="i" class="sr-only">Enter text</label><textarea id="i" placeholder="Paste your script here (Urdu, English, Arabic, German)..."></textarea><button class="btn btn-play" onclick="r()">Generate Audio</button><button id="d" class="btn btn-download" onclick="dl()">Download MP3 Audio</button></div><select id="vSel" onchange="this.style.display='none'"></select><div class="audio-sel" onclick="tV()" role="button" aria-label="Settings"><span style="font-size:18px">🎧</span><span class="atxt">Select Audio</span></div><script>const s=window.speechSynthesis;function lV(){const vs=s.getVoices();const sel=document.getElementById("vSel");sel.innerHTML=vs.map((v,i)=>`<option value="${i}">${v.name}</option>`).join("")}if(s.onvoiceschanged!==undefined)s.onvoiceschanged=lV;function tV(){const sel=document.getElementById("vSel");sel.style.display=sel.style.display==='block'?'none':'block';lV()}function r(){const t=document.getElementById("i").value;const w=document.getElementById("wb");if(!t)return;if(s.speaking)s.cancel();const u=new SpeechSynthesisUtterance(t);const v=s.getVoices();const si=document.getElementById("vSel").value;if(si!==""){u.voice=v[si]}else{if(/[\u0600-\u06FF]/.test(t)){u.lang="ur-PK";u.voice=v.find(x=>x.lang.includes("ur"))}else if(/[äöüßÄÖÜ]/.test(t)){u.lang="de-DE";u.voice=v.find(x=>x.lang.includes("de"))}else{u.lang="en-US";u.voice=v.find(x=>x.lang.startsWith("en"))}}u.rate=0.9;s.speak(u);u.onstart=()=>{w.style.display="flex";document.getElementById("d").style.display="block"};u.onend=()=>{w.style.display="none"}}function dl(){const t=document.getElementById("i").value;window.open(`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(t)}&tl=ur&client=tw-ob`)}</script></body></html>
