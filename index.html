<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Elite Vocalizer | Ultra Pro</title><style>:root{--primary:#00ff88;--secondary:#00bdff;--bg:#0d1117;--card:#161b22;--text:#c9d1d9;--gradient:linear-gradient(45deg,#00ff88,#00bdff,#7000ff)}body{font-family:'Segoe UI',sans-serif;background-color:var(--bg);color:var(--text);margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}.container{max-width:550px;width:100%;background:var(--card);padding:40px;border-radius:28px;box-shadow:0 25px 60px rgba(0,0,0,0.8);border:1px solid #30363d;position:relative;text-align:center}.brand-title{font-size:3.2rem;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:5px;filter:drop-shadow(0 0 15px rgba(0,255,136,0.4));letter-spacing:-1.5px}textarea{width:100%;padding:22px;background:#0d1117;border:1px solid #30363d;border-radius:18px;color:white;box-sizing:border-box;font-size:1.15rem;margin-bottom:25px;resize:none;min-height:200px}.btn{width:100%;padding:18px;border:none;border-radius:14px;font-weight:800;cursor:pointer;font-size:1.1rem;text-transform:uppercase;transition:0.3s;margin-bottom:15px}.btn-play{background:var(--primary);color:#0d1117;box-shadow:0 8px 20px rgba(0,255,136,0.25)}.btn-download{background:transparent;color:var(--primary);border:2px solid var(--primary);display:none}.btn:hover{transform:scale(1.02);filter:brightness(1.1)}.wave-box{display:none;justify-content:center;align-items:center;gap:6px;height:50px;margin-bottom:25px}.w{width:6px;height:100%;border-radius:10px;animation:wv 1s ease-in-out infinite}.w:nth-child(odd){background:var(--primary)}.w:nth-child(even){background:var(--secondary);animation-delay:0.2s}@keyframes wv{0%,100%{transform:scaleY(0.3)}50%{transform:scaleY(1.4)}}.audio-sel{position:fixed;bottom:25px;right:25px;display:flex;flex-direction:column;align-items:center;background:var(--card);border:1px solid var(--primary);border-radius:12px;padding:8px 12px;cursor:pointer;z-index:100}.atxt{font-size:9px;color:var(--text);margin-top:5px;text-transform:uppercase;font-weight:800}#vSel{position:fixed;bottom:95px;right:25px;background:var(--card);color:white;border:1px solid var(--primary);padding:12px;display:none;border-radius:15px;font-size:14px;max-width:220px;z-index:101}</style></head><body><div class="container"><div class="brand-title">Elite Vocalizer</div><div id="wb" class="wave-box"><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div></div><textarea id="i" placeholder="Paste your elite script here..."></textarea><button class="btn btn-play" onclick="r()">Generate Audio</button><button id="d" class="btn btn-download" onclick="dl()">Download Audio</button></div><select id="vSel" onchange="sV(this.value)"></select><div class="audio-sel" onclick="tV()"><span style="font-size:20px">🎧</span><span class="atxt">Select Audio</span></div><script>const s=window.speechSynthesis;let sVIdx=localStorage.getItem("vIdx")||"";function lV(){const vs=s.getVoices();const sel=document.getElementById("vSel");sel.innerHTML=vs.map((v,i)=>`<option value="${i}" ${sVIdx==i?'selected':''}>${v.name}</option>`).join("")}if(s.onvoiceschanged!==undefined)s.onvoiceschanged=lV;lV();function tV(){const sel=document.getElementById("vSel");sel.style.display=sel.style.display==='block'?'none':'block';lV()}function sV(v){sVIdx=v;localStorage.setItem("vIdx",v);document.getElementById("vSel").style.display='none'}function r(){const t=document.getElementById("i").value,w=document.getElementById("wb"),v=s.getVoices();if(!t)return;if(s.speaking)s.cancel();const u=new SpeechSynthesisUtterance(t);if(sVIdx!==""){const sv=v[sVIdx];u.voice=sv;u.lang=sv.lang}else{u.lang=/[\u0600-\u06FF]/.test(t)?"ur-PK":"en-US"}u.rate=0.95;s.speak(u);u.onstart=()=>{w.style.display="flex";document.getElementById("d").style.display="block"};u.onend=()=>{w.style.display="none"}}function dl(){const t=document.getElementById("i").value;const v=s.getVoices();const lang=sVIdx!==""?v[sVIdx].lang.split('-')[0]:(/[\u0600-\u06FF]/.test(t)?"ur":"en");const url=`https://translate.google.com/translate_tts?ie=UTF-8&q=${encodeURIComponent(t)}&tl=${lang}&client=tw-ob`;const a=document.createElement("a");a.href=url;a.target="_blank";a.download="elite_audio.mp3";document.body.appendChild(a);a.click();document.body.removeChild(a)}</script></body></
