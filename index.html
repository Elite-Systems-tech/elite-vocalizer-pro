<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Elite Vocalizer | Ultra Digital</title><style>:root{--p:#00ff88;--s:#00bdff;--bg:#05070a;--c:#11141b;--g:linear-gradient(135deg,#00ff88,#00bdff,#7000ff)}body{font-family:'Inter','Segoe UI',sans-serif;background-color:var(--bg);color:#fff;margin:0;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden}.container{max-width:500px;width:90%;background:rgba(17,20,27,0.8);padding:50px 40px;border-radius:40px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);box-shadow:0 0 80px rgba(0,255,136,0.15);text-align:center;position:relative}.t{font-size:3.5rem;font-weight:900;background:var(--g);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px;filter:drop-shadow(0 0 20px rgba(0,255,136,0.4));letter-spacing:-2px}textarea{width:100%;padding:25px;background:rgba(0,0,0,0.3);border:1px solid #30363d;border-radius:24px;color:#fff;font-size:1.1rem;margin-bottom:30px;resize:none;min-height:220px;outline:none;transition:0.3s}textarea:focus{border-color:var(--p);box-shadow:0 0 15px rgba(0,255,136,0.2)}.btn{width:100%;padding:20px;border:none;border-radius:20px;font-weight:800;cursor:pointer;font-size:1.2rem;text-transform:uppercase;background:var(--g);color:#000;transition:0.4s;box-shadow:0 10px 30px rgba(0,255,136,0.3)}.btn:hover{transform:translateY(-5px);box-shadow:0 15px 40px rgba(0,255,136,0.5)}.btn:active{transform:scale(0.98)}.wb{display:none;justify-content:center;gap:8px;height:60px;margin-bottom:30px}.w{width:8px;height:100%;border-radius:20px;animation:v 1s ease-in-out infinite}.w:nth-child(odd){background:var(--p)}.w:nth-child(even){background:var(--s);animation-delay:0.2s}@keyframes v{0%,100%{transform:scaleY(0.2);filter:brightness(1)}50%{transform:scaleY(1.5);filter:brightness(1.5)}}.s-box{position:fixed;bottom:30px;right:30px;background:var(--c);border:1px solid var(--p);border-radius:20px;padding:12px;cursor:pointer;box-shadow:0 10px 30px rgba(0,0,0,0.5);z-index:100}#vSel{position:fixed;bottom:110px;right:30px;background:var(--c);color:#fff;border:1px solid var(--p);padding:15px;display:none;border-radius:20px;outline:none;z-index:101}</style></head><body><div class="container"><div class="t">Elite Vocalizer</div><div id="wb" class="wb"><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div><div class="w"></div></div><textarea id="i" placeholder="Enter Elite Script..."></textarea><button class="btn" onclick="r()">Generate Audio</button></div><select id="vSel" onchange="sV(this.value)"><option value="ur-PK">Urdu (Pakistan)</option><option value="en-US">English (Pro)</option><option value="ar-SA">Arabic (Proper)</option><option value="de-DE">German</option></select><div class="s-box" onclick="tV()"><span style="font-size:24px">🎙️</span></div><script>let s=window.speechSynthesis,cL=localStorage.getItem("cL")||"ur-PK";function tV(){let x=document.getElementById("vSel");x.style.display=x.style.display==="block"?"none":"block"}function sV(v){cL=v;localStorage.setItem("cL",v);document.getElementById("vSel").style.display="none"}function r(){let t=document.getElementById("i").value,w=document.getElementById("wb");if(!t)return;s.cancel();let u=new SpeechSynthesisUtterance(t);u.lang=cL;u.rate=0.95;u.onstart=()=>w.style.display="flex";u.onend=()=>w.style.display="none";s.speak(u)}</script></body></html>
